include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - "build/**"
    - "lib/intl/**"
    - "**/*.freezed.dart"
    - "**/*.g.dart"
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    todo: ignore

dart_code_metrics:
  rules:
    ## Dart rules
    avoid-cascade-after-if-null: true
    avoid-duplicate-named-imports: true
    avoid-dynamic: true
    avoid-self-compare: true
    avoid-throw-in-catch-block: true
    binary-expression-operand-order: true
    double-literal-format: true
    newline-before-return: true
    no-boolean-literal-compare: true
    no-equal-then-else: true
    prefer-conditional-expressions: true
    prefer-enums-by-name: true
    prefer-first: true
    prefer-immediate-return: true
    prefer-iterable-of: true
    prefer-last: true

    ## Flutter rules
    avoid-border-all: true
    avoid-expanded-as-spacer: true
    avoid-shrink-wrap-in-lists: true
    avoid-wrapping-in-padding: true
    check-for-equals-in-render-object-setters: true
    prefer-const-border-radius: true
    prefer-correct-edge-insets-constructor: true
    prefer-text-rich: true

formatter:
  page_width: 120

linter:
  rules:
    ## Error rules.
    always_use_package_imports: false
    avoid_dynamic_calls: true
    avoid_slow_async_io: true
    avoid_type_to_string: true
    cancel_subscriptions: true
    close_sinks: true
    comment_references: true
    # правило побуждает очень много false positives
    discarded_futures: false
    literal_only_boolean_expressions: true
    no_adjacent_strings_in_list: true
    no_self_assignments: true
    test_types_in_equals: true
    throw_in_finally: true
    unnecessary_statements: true

    ## Style rules.
    always_declare_return_types: true
    # мы не хотим ограничивать себя в том чтобы иметь возможность писать в одну строчку `if (x > 0) return x;`
    always_put_control_body_on_new_line: false
    # наше соглашение по стилю кодирования подразумевает, что автор api оптимально отсортировал аргументы и только требуемые пометил как обязательные
    always_put_required_named_parameters_first: false
    # мы полагаемся на вывод типов анализатором кода ( конфликт с avoid_types_on_closure_parameters )
    always_specify_types: false
    avoid_annotating_with_dynamic: true
    avoid_bool_literals_in_conditional_expressions: true
    avoid_catches_without_on_clauses: true
    avoid_catching_errors: true
    # т.к. в Dart нет namespaces, мы используем классы только со статическими методами как замену последних
    avoid_classes_with_only_static_members: false
    avoid_double_and_int_checks: true
    avoid_equals_and_hash_code_on_mutable_classes: true
    avoid_escaping_inner_quotes: true
    avoid_field_initializers_in_const_classes: true
    avoid_final_parameters: true
    avoid_implementing_value_types: true
    avoid_js_rounded_ints: true
    avoid_multiple_declarations_per_line: true
    # стандартное api Dart/Flutter противоречит этому правилу
    avoid_positional_boolean_parameters: false
    avoid_private_typedef_functions: true
    # правило требует от нас не передавать аргументы, значение которых идентично значению по-умолчанию, которое оставил автор api, но как мы поймём, что кто-то сменил значение по-умолчанию?
    avoid_redundant_argument_values: false
    avoid_returning_this: true
    avoid_setters_without_getters: true
    avoid_types_on_closure_parameters: true
    avoid_unused_constructor_parameters: true
    avoid_void_async: true
    cascade_invocations: true
    cast_nullable_to_non_nullable: true
    collection_methods_unrelated_type: true
    combinators_ordering: true
    conditional_uri_does_not_exist: true
    deprecated_consistency: true
    deprecated_member_use_from_same_package: true
    # не видим смысла в подобных вещах
    diagnostic_describe_all_properties: false
    directives_ordering: true
    # для конфигурации сборки мы прибегаем к использованию механизма --dart-define (https://dart.dev/guides/environment-declarations)
    do_not_use_environment: false
    eol_at_end_of_file: true
    flutter_style_todos: true
    implicit_reopen: true
    invalid_case_patterns: true
    join_return_with_assignment: true
    leading_newlines_in_multiline_strings: true
    library_names: true
    # как мне кажется, это правило имеет ложное срабатывания, мы следим чтобы наш код был отформатирован по стандарту в диапазоне 80 символов. Но что-то работает не корректно либо правило, либо
    lines_longer_than_80_chars: false
    missing_code_block_language_in_doc_comment: true
    missing_whitespace_between_adjacent_strings: true
    matching_super_parameters: true
    # не видим смысла тк побуждает нас делать код более громоздким
    no_default_cases: false
    no_runtimeType_toString: true
    noop_primitive_operations: true
    omit_local_variable_types: true
    omit_obvious_local_variable_types: true
    # не видим ничего криминального в интерфейсах с одним методом
    one_member_abstracts: false
    only_throw_errors: true
    package_prefixed_library_names: true
    parameter_assignments: true
    prefer_asserts_in_initializer_lists: true
    prefer_asserts_with_message: true
    prefer_const_constructors: true
    prefer_const_declarations: true
    prefer_constructors_over_static_methods: true
    # наше соглашение по стилю кодирования подразумевает использование одинарных кавычек ( конфликт с prefer_single_quotes )
    prefer_double_quotes: false
    prefer_equal_for_default_values: true
    prefer_expression_function_bodies: true
    prefer_final_in_for_each: true
    prefer_final_locals: true
    # мы за то, чтобы аргументы функции были неизменными, слово final засоряет контракт ( конфликт с avoid_final_parameters )
    prefer_final_parameters: false
    # forEach одна из самых медленных реализаций циклов (https://itnext.io/comparing-darts-loops-which-is-the-fastest-731a03ad42a2)
    prefer_foreach: false
    prefer_if_elements_to_conditional_expressions: true
    # усложняет определение double констант
    prefer_int_literals: false
    prefer_mixin: true
    prefer_null_aware_method_calls: true
    prefer_relative_imports: true
    prefer_single_quotes: true
    prefer_void_to_null: true
    # мы ещё не готовы покрывать всё документацией (но мы стремимся к этому)
    public_member_api_docs: false
    # отключено тк сейчас правило конфликтует с новым форматером
    require_trailing_commas: false
    sized_box_shrink_expand: true
    # сортировку элементов внутри класса мы доверили человеческому фактору
    sort_constructors_first: false
    # сортировку элементов внутри класса мы доверили человеческому фактору
    sort_unnamed_constructors_first: false
    tighten_type_of_initializing_formals: true
    type_annotate_public_apis: true
    unawaited_futures: true
    unnecessary_breaks: true
    unnecessary_await_in_return: true
    # иммутабильность побуждает нас писать более выразительный код, локальные переменные не исключение ( конфликт с prefer_final_locals )
    unnecessary_final: false
    unnecessary_ignore: true
    unnecessary_lambdas: true
    unnecessary_library_directive: true
    unnecessary_null_aware_operator_on_extension_on_nullable: true
    unnecessary_null_checks: true
    unnecessary_parenthesis: true
    unnecessary_raw_strings: true
    unreachable_from_main: true
    use_colored_box: true
    use_decorated_box: true
    use_enums: true
    use_if_null_to_convert_nulls_to_bools: true
    use_is_even_rather_than_modulo: true
    use_late_for_private_fields_and_variables: true
    use_named_constants: true
    use_null_aware_elements: true
    use_raw_strings: true
    # использовать сеттеры или методы по типу setValue это выбор автора кода, мы не хотим тут навязывать какой либо единственный вариант
    use_setters_to_change_properties: false
    use_string_buffers: true
    use_test_throws_matchers: true
    use_to_and_as_if_applicable: true
    use_truncating_division: true

    ## Pub rules.
    sort_pub_dependencies: true
